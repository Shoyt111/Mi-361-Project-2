<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JBBNS Login</title>
    <link rel="stylesheet" href="static/css/login.css">
    <script src="static/js/login.js"></script>
</head>
<body>
    <header>
        <img src="static/resources/jbbns_logo.svg" class="logo--big">
        <h1>Log in to view gallery!</h1>
    </header>

    <form method="post" action="/login">
        <div>
            <label for="emailField">Email</label>
            <input type="text" id="emailField" placeholder="Email..." name="email">

            <label for="passField">Password</label>
            <input type="password" id="passField" name="pass">
        </div>

        <div class="inputDiv">
            <input type="button" value="Login" id="loginButton" onclick = "createForm('login');">
            <input type="button" value="Create Account" id="createButton" onclick="createForm('create')">
    </form>
    <script>
        function createForm(mode)
        {
            var email = document.getElementById("emailField").value;
            var password = document.getElementById("passField").value;
            if (mode === 'login')
            {
                login(email,password);

            }
            else if (mode === 'create')
            {
                createAccount(email,password);
            }
        }
    </script>
</body>
</html>

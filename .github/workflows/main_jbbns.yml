# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python Flask app to Azure Web App - JBBNS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses : actions/setup-python@v5
        with :
          python-version: '3.12'
      
      - script: |
          python -m venv atev
          source antev/bin/activate
          python -m pip install --upgrade pip
          pip install setup
          pip install -r requirements.txt
      

      - name : Zip artifact
        run : zip -r app.zip .

      - name : Upload artifact for deployment job
        uses : actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_061E35A8B82F4DE59477BC6892F7E553 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE4360491E4B459F8F7F3B05A41B8B1F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6F60CC5BC3F6429B89954C62BE20A64C }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'JBBNS'
          slot-name: 'Production'
          package: app.zip
          